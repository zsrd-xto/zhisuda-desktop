name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist-script: dist:win
          - os: macos-latest
            dist-script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.dist-script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.yml' -o -name '*.blockmap' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync website release info
        run: |
          mkdir -p dist
          cp release/*.yml dist/ 2>/dev/null || true
          cp release/*.exe dist/ 2>/dev/null || true
          cp release/*.dmg dist/ 2>/dev/null || true
          node scripts/sync-release-info.mjs || true

      - name: Upload releases.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: releases-json
          path: website/public/releases.json
